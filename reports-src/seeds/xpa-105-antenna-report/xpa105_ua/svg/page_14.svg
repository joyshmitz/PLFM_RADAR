<text x='56' y='445.64' font-size='9.2' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='56' y='445.64'>Різниця 3.1% між аналітичною довжиною патча та значенням, яке підібрано у FDTD, є типовою та</tspan>
<tspan x='56' dy='11.776'>очікуваною. Формули Balanis і Hammerstad не враховують паразитну індуктивність щупа, дифракцію на</tspan>
<tspan x='56' dy='11.776'>краях скінченної земної площини та близькість поглинальних меж MUR. Для виробництва PCB слід</tspan>
<tspan x='56' dy='11.776'>використовувати саме FDTD-підігнану довжину 7.401 mm.</tspan>
</text>
