<tspan x='236.0' y='258.652'>47.1 + j0.2 Ohm</tspan>
</text>
<text x='426.0' y='258.652' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='426.0' y='258.652'>Майже ідеальне узгодження з 50 Ohm</tspan>
</text>
