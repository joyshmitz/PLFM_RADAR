<tspan x='236.0' y='326.692'>56.7%</tspan>
</text>
<text x='426.0' y='326.692' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='426.0' y='326.692'>Адекватно для підкладки 0.102 mm</tspan>
</text>
<rect x='56' y='334.47200000000004' width='120.0' height='22.68' fill='#f9fbff' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
