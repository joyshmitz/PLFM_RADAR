<tspan x='62' y='349.372'>Реалізоване підсилення</tspan>
</text>
<text x='236.0' y='349.372' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='236.0' y='349.372'>4.72 dBi</tspan>
</text>
<text x='426.0' y='349.372' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='426.0' y='349.372'>Узгоджується з D x eta</tspan>
</text>
<rect x='56' y='369.15200000000004' width='500' height='74.88' fill='#f4fbf6' stroke='#43b96d' stroke-width='1.5' rx='4' ry='4'/>
<text x='64' y='383.15200000000004' font-size='9.2' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='64' y='383.15200000000004'>Ключовий висновок: моделювання підтверджує, що патч-елемент XPA-105 коректно спроєктований для</tspan>
<tspan x='64' dy='11.776'>роботи на 10.5 GHz. Дуже добре узгодження імпедансу (S11 = -30.6 dB, Zin = 47.1 Ohm) означає</tspan>
<tspan x='64' dy='11.776'>мінімальне відбиття потужності в точці живлення, а директивність 7.19 dBi узгоджується з</tspan>
<tspan x='64' dy='11.776'>опублікованими даними для прямокутних мікросмужкових патчів. Для повного масиву з 128 елементів</tspan>
<tspan x='64' dy='11.776'>очікуване підсилення близько 25.8 dBi є конкурентним для X-діапазонних фазованих решіток.</tspan>
</text>
<text x='556' y='774' font-size='8' font-weight='400' font-family='sans-serif' fill='#6b778c' text-anchor='end'>
<tspan x='556' y='774'>3</tspan>
</text>
</svg>