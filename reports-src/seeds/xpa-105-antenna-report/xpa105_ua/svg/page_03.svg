<rect x='296.0' y='289.112' width='260.0' height='22.68' fill='#f9fbff' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='304.012' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='62' y='304.012'>Пікова директивність</tspan>
</text>
<text x='236.0' y='304.012' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='236.0' y='304.012'>7.19 dBi</tspan>
</text>
<text x='426.0' y='304.012' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='426.0' y='304.012'>Класичне значення для одиночного патча</tspan>
</text>
<rect x='56' y='311.79200000000003' width='120.0' height='22.68' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='176.0' y='311.79200000000003' width='120.0' height='22.68' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='296.0' y='311.79200000000003' width='260.0' height='22.68' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
