<svg xmlns='http://www.w3.org/2000/svg' width='612' height='792' viewBox='0 0 612 792'>
<rect x='0' y='0' width='612' height='792' fill='white'/>
<line x1='56' y1='58' x2='556' y2='58' stroke='#2b3f67' stroke-width='3'/>
<text x='56' y='82' font-size='18' font-weight='700' font-family='sans-serif' fill='#2b3f67' text-anchor='start'>
<tspan x='56' y='82'>1. Підсумок для керівництва</tspan>
</text>
<text x='56' y='112' font-size='10.1' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='56' y='112'>Було змодельовано та проаналізовано один прямокутний мікросмужковий патч-елемент для</tspan>
<tspan x='56' dy='12.927999999999999'>фазованої решітки радара XPA-105 8x16 за допомогою розв&apos;язувача OpenEMS FDTD. Моделювання</tspan>
<tspan x='56' dy='12.927999999999999'>підтверджує роботу антени на 10.5 GHz на підкладці Rogers RO4350B і показує, що одиночний</tspan>
<tspan x='56' dy='12.927999999999999'>елемент виконує всі цільові вимоги перед інтеграцією у повний масив 8 x 16 (128 елементів).</tspan>
</text>
<rect x='56' y='175.712' width='120.0' height='22.68' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='190.612' font-size='8.9' font-weight='700' font-family='sans-serif' fill='white' text-anchor='start'>
<tspan x='62' y='190.612'>Метрика</tspan>
</text>
<rect x='176.0' y='175.712' width='120.0' height='22.68' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
