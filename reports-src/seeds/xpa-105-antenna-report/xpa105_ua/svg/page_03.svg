</text>
<text x='426.0' y='213.292' font-size='8.9' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='426.0' y='213.292'>Точно в ціль (0.05% від 10.5 GHz)</tspan>
</text>
<rect x='56' y='221.072' width='120.0' height='22.68' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
