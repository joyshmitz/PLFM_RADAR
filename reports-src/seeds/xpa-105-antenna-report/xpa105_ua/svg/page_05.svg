</text>
<text x='201.0' y='601.7400000000001' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='201.0' y='601.7400000000001'>1.54</tspan>
</text>
<text x='306.0' y='601.7400000000001' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='306.0' y='601.7400000000001'>49.3 + j0.5</tspan>
</text>
