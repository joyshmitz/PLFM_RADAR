</text>
<rect x='56' y='609.4000000000002' width='100.0' height='21.96' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='156.0' y='609.4000000000002' width='90.0' height='21.96' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
