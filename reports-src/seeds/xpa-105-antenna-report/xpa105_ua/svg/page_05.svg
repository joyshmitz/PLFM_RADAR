<tspan x='201.0' y='535.84'>Зсув живлення (мм)</tspan>
</text>
<rect x='246.0' y='521.44' width='120.0' height='22.08' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
