<tspan x='62' y='579.7800000000001'>2 (виправлення L)</tspan>
</text>
<text x='201.0' y='579.7800000000001' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='201.0' y='579.7800000000001'>2.76</tspan>
</text>
