<svg xmlns='http://www.w3.org/2000/svg' width='612' height='792' viewBox='0 0 612 792'>
<rect x='0' y='0' width='612' height='792' fill='white'/>
<line x1='56' y1='58' x2='556' y2='58' stroke='#2b3f67' stroke-width='3'/>
<text x='56' y='82' font-size='18' font-weight='700' font-family='sans-serif' fill='#2b3f67' text-anchor='start'>
<tspan x='56' y='82'>3. Налаштування моделювання</tspan>
</text>
<text x='56' y='112' font-size='12.5' font-weight='700' font-family='sans-serif' fill='#405a8a' text-anchor='start'>
<tspan x='56' y='112'>3.1 Конфігурація FDTD</tspan>
</text>
<text x='56' y='136.0' font-size='9.6' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='56' y='136.0'>Антену змодельовано в OpenEMS - це відкритий електромагнітний розв&apos;язувач типу FDTD</tspan>
<tspan x='56' dy='12.288'>(Finite-Difference Time-Domain). Модель враховує повну тривимірну структуру: патч, підкладку,</tspan>
<tspan x='56' dy='12.288'>землю та щуп живлення всередині області з поглинальними межами.</tspan>
</text>
<rect x='56' y='182.864' width='210.0' height='22.560000000000002' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='197.66400000000002' font-size='8.8' font-weight='700' font-family='sans-serif' fill='white' text-anchor='start'>
<tspan x='62' y='197.66400000000002'>Параметр</tspan>
</text>
<rect x='266.0' y='182.864' width='290.0' height='22.560000000000002' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='411.0' y='197.66400000000002' font-size='8.8' font-weight='700' font-family='sans-serif' fill='white' text-anchor='middle'>
