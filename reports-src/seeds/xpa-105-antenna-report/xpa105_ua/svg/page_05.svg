<tspan x='62' y='287.444'>Розмір області</tspan>
</text>
<text x='411.0' y='287.444' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='287.444'>80 x 80 x 50 mm</tspan>
</text>
