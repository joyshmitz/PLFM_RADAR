<rect x='446.0' y='609.4000000000002' width='110.0' height='21.96' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='623.7000000000002' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='62' y='623.7000000000002'>4 (фінальна)</tspan>
</text>
<text x='201.0' y='623.7000000000002' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='201.0' y='623.7000000000002'>1.49</tspan>
</text>
<text x='306.0' y='623.7000000000002' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='306.0' y='623.7000000000002'>47.1 + j0.2</tspan>
</text>
<text x='406.0' y='623.7000000000002' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='406.0' y='623.7000000000002'>-30.6</tspan>
</text>
<text x='501.0' y='623.7000000000002' font-size='8.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='501.0' y='623.7000000000002'>10.50</tspan>
</text>
<text x='56' y='639.3600000000002' font-size='9.2' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='56' y='639.3600000000002'>Третя ітерація дала найкраще значення S11 (-41.7 dB), але на частоті 10.17 GHz. Фінальна тонка</tspan>
<tspan x='56' dy='11.776'>підстройка до 1.49 mm зсунула резонанс у точку 10.50 GHz і зберегла дуже добре узгодження S11 = -30.6</tspan>
<tspan x='56' dy='11.776'>dB. Невелике відхилення від теоретично оптимальної точки пояснюється паразитною індуктивністю щупа,</tspan>
<tspan x='56' dy='11.776'>яка впливає і на імпеданс, і на резонансну частоту.</tspan>
