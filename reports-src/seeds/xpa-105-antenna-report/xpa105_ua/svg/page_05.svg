<tspan x='62' y='332.324'>Крок часу (Courant)</tspan>
</text>
<text x='411.0' y='332.324' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='332.324'>79.5 fs</tspan>
</text>
<rect x='56' y='340.064' width='210.0' height='22.439999999999998' fill='#f9fbff' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='266.0' y='340.064' width='290.0' height='22.439999999999998' fill='#f9fbff' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='354.764' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='62' y='354.764'>Максимум кроків</tspan>
</text>
<text x='411.0' y='354.764' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='354.764'>120,000</tspan>
</text>
<rect x='56' y='362.504' width='210.0' height='22.439999999999998' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='266.0' y='362.504' width='290.0' height='22.439999999999998' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='377.204' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='62' y='377.204'>Критерій зупинки</tspan>
</text>
<text x='411.0' y='377.204' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='377.204'>-50 dB (досягнуто -49 dB)</tspan>
</text>
<rect x='56' y='384.944' width='210.0' height='22.439999999999998' fill='#f9fbff' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='266.0' y='384.944' width='290.0' height='22.439999999999998' fill='#f9fbff' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='399.644' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='62' y='399.644'>Роздільна здатність сітки</tspan>
</text>
<text x='411.0' y='399.644' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='399.644'>lambda/20 при 12.5 GHz (~1.2 mm)</tspan>
</text>
<rect x='56' y='407.384' width='210.0' height='22.439999999999998' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<rect x='266.0' y='407.384' width='290.0' height='22.439999999999998' fill='white' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='422.084' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='62' y='422.084'>Комірки по товщині підкладки</tspan>
</text>
<text x='411.0' y='422.084' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='422.084'>4 (через 0.102 mm)</tspan>
</text>
<text x='56' y='439.824' font-size='12.5' font-weight='700' font-family='sans-serif' fill='#405a8a' text-anchor='start'>
<tspan x='56' y='439.824'>3.2 Калібрування точки живлення</tspan>
</text>
<text x='56' y='463.824' font-size='9.3' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='56' y='463.824'>Положення щупа живлення було підібрано ітераційним моделюванням. Вхідний імпеданс probe-fed патча</tspan>
<tspan x='56' dy='11.904000000000002'>змінюється за законом Z(y) = Z_edge x sin^2(pi y / L) від центру до краю, де для цієї геометрії</tspan>
<tspan x='56' dy='11.904000000000002'>Z_edge становить близько 144 Ohm. Оптимальний зсув для узгодження з 50 Ohm знайдено на відстані y =</tspan>
<tspan x='56' dy='11.904000000000002'>1.49 mm від центру патча.</tspan>
</text>
<rect x='56' y='521.44' width='100.0' height='22.08' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
<text x='62' y='535.84' font-size='8.4' font-weight='700' font-family='sans-serif' fill='white' text-anchor='start'>
<tspan x='62' y='535.84'>Ітерація</tspan>
</text>
<rect x='156.0' y='521.44' width='90.0' height='22.08' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
