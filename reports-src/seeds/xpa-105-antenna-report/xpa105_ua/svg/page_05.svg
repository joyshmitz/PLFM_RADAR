<tspan x='62' y='220.124'>Збудження</tspan>
</text>
<text x='411.0' y='220.124' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='220.124'>Гаусовий імпульс, f0 = 10.5 GHz, BW = 4 GHz</tspan>
</text>
