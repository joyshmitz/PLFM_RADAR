<tspan x='62' y='265.00399999999996'>Граничні умови</tspan>
</text>
<text x='411.0' y='265.00399999999996' font-size='8.7' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='411.0' y='265.00399999999996'>MUR, 1-й порядок, поглинальні, всі 6 граней</tspan>
</text>
