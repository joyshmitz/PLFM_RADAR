<text x='56' y='82' font-size='18' font-weight='700' font-family='sans-serif' fill='#2b3f67' text-anchor='start'>
<tspan x='56' y='82'>4. Результати</tspan>
</text>
<text x='56' y='112' font-size='12.5' font-weight='700' font-family='sans-serif' fill='#405a8a' text-anchor='start'>
<tspan x='56' y='112'>4.1 S-параметри (втрати на відбиття)</tspan>
</text>
<image href='/Users/sd/projects/PLFM_RADAR/reports-src/seeds/xpa-105-antenna-report/extracted/img-000.png' x='56.0' y='136.0' width='500' height='300.0'/>
<text x='306.0' y='442.0' font-size='8.5' font-weight='400' font-family='sans-serif' fill='#6b778c' text-anchor='middle'>
<tspan x='306.0' y='442.0'>Рисунок 4.1 - Втрати на відбиття S11 залежно від частоти. Глибокий мінімум на 10.495 GHz підтверджує резонанс</tspan>
<tspan x='306.0' dy='10.88'>із рівнем -30.6 dB.</tspan>
</text>
<text x='56' y='473.76' font-size='9.5' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='56' y='473.76'>Що це показує: параметр S11 описує, яка частка потужності відбивається назад від точки живлення</tspan>
<tspan x='56' dy='12.16'>антени. Значення нижче -10 dB означає, що понад 90% потужності випромінюється або поглинається,</tspan>
<tspan x='56' dy='12.16'>тобто узгодження є прийнятним. Патч XPA-105 досягає -30.6 dB на 10.495 GHz, отже антена приймає</tspan>
<tspan x='56' dy='12.16'>приблизно 99.9% падаючої потужності.</tspan>
</text>
<rect x='56' y='534.4' width='200.0' height='22.68' fill='#2b3f67' stroke='#cfd7e5' stroke-width='1' rx='0' ry='0'/>
