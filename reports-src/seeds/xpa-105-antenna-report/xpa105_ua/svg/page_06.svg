</text>
<text x='406.0' y='639.5599999999997' font-size='8.8' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='middle'>
<tspan x='406.0' y='639.5599999999997'>0.48%</tspan>
</text>
<rect x='56' y='657.3199999999997' width='500' height='61.056000000000004' fill='#f4fbf6' stroke='#43b96d' stroke-width='1.5' rx='4' ry='4'/>
<text x='64' y='671.3199999999997' font-size='8.8' font-weight='400' font-family='sans-serif' fill='#29364b' text-anchor='start'>
<tspan x='64' y='671.3199999999997'>Примітка щодо конструкції: вузька смуга 0.48% є фізично коректною для підкладки товщиною 0.102 mm</tspan>
<tspan x='64' dy='11.264000000000001'>(h/lambda = 0.0036). Типові X-діапазонні патчі на 4-mil Rogers дають близько 0.3-0.8% смуги. Це означає</tspan>
<tspan x='64' dy='11.264000000000001'>високу чутливість до виробничих допусків: зміна довжини патча на 0.1 mm зсуває резонанс приблизно на</tspan>
<tspan x='64' dy='11.264000000000001'>140 MHz. Для виготовлення PCB потрібен допуск не гірше +/-0.025 mm (+/-1 mil).</tspan>
</text>
<text x='556' y='774' font-size='8' font-weight='400' font-family='sans-serif' fill='#6b778c' text-anchor='end'>
<tspan x='556' y='774'>6</tspan>
</text>
</svg>